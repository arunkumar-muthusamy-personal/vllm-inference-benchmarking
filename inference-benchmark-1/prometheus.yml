global:
  scrape_interval: 10s

scrape_configs:
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'dcgm_exporter'
    static_configs:
      - targets: ['dcgm-exporter:9400']

  - job_name: 'vllm'
    static_configs:
      - targets: ['vllm:8000']